apiVersion: 1

providers:
  - name: notiflab-dashboards
    orgId: 1
    folder: notification-lab
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
