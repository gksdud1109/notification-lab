# == M0 측정 인프라 ==
# ★ 핵심 규칙: 부하 생성기(k6)와 측정 대상(app)의 CPU를 분리한다. ★
# 같은 코어를 공유하면 서버가 느린 건지 k6가 굶은 건지 구분이 불가능해진다.
services:
  app:
    build: ./backend
    ports:
      - "8080:8080"
    cpus: 2.0 # 측정 대상 자원 고정
    mem_limit: 1g
    environment:
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on: [ app ]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3300:3300"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [ prometheus ]

  # k6는 부하를 걸 때만 실행:
  #   docker compose --profile load run --rm k6 run /scripts/k6-m0.js
  # (호스트 코어가 app 2 + k6 2 = 4코어 이상이어야 격리가 의미 있다.)
  k6:
    image: grafana/k6:latest
    cpus: 2.0 # 생성기 자원도 고정·분리
    volumes:
      - ./load:/scripts:ro
    environment:
      TARGET: http://app:8080
    profiles: [ "load" ]
    depends_on: [ app ]
